<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portefeuille - DIAWLAL</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .portefeuille {
            width: min(1000px, 92%);
            margin: 0 auto;
            padding: 50px 0;
        }

        .resume {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .resume-card,
        .operation-box,
        .historique-box {
            background: white;
            color: #1f2937;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
        }

        .resume-card h2 {
            color: #1e3a5f;
            margin-bottom: 12px;
        }

        .montant {
            font-size: 28px;
            font-weight: bold;
            color: #4f46e5;
        }

        .operation-box,
        .historique-box {
            margin-top: 25px;
        }

        .operation-box h2,
        .historique-box h2 {
            margin-bottom: 18px;
        }

        select {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .operation {
            padding: 14px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .positif {
            color: #15803d;
        }

        .negatif {
            color: #dc2626;
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">DIAWLAL</div>

        <div>
            <a href="dashboard.html">Tableau de bord</a>
            <a href="academy.html">Academy</a>
            <a href="portefeuille.html">Portefeuille</a>
            <a href="alertes.html">Alertes</a>
            <a href="profil.html">Profil</a>
        </div>
    </nav>

    <main class="portefeuille">

        <h1>Mon portefeuille</h1>

        <section class="resume">

            <div class="resume-card">
                <h2>Capital disponible</h2>
                <p class="montant" id="capitalDisponible">0 FCFA</p>
            </div>

            <div class="resume-card">
                <h2>Total des revenus</h2>
                <p class="montant" id="totalRevenus">0 FCFA</p>
            </div>

            <div class="resume-card">
                <h2>Total des dépenses</h2>
                <p class="montant" id="totalDepenses">0 FCFA</p>
            </div>

        </section>

        <section class="operation-box">

            <h2>Ajouter une opération</h2>

            <select id="typeOperation">
                <option value="revenu">Revenu</option>
                <option value="depense">Dépense</option>
            </select>

            <input
                type="text"
                id="descriptionOperation"
                placeholder="Description"
            >

            <input
                type="number"
                id="montantOperation"
                placeholder="Montant en FCFA"
                min="1"
            >

            <button onclick="ajouterOperation()">
                Enregistrer l’opération
            </button>

        </section>

        <section class="historique-box">

            <h2>Historique</h2>

            <div id="listeOperations">
                <p>Aucune opération enregistrée.</p>
            </div>

        </section>

    </main>

    <footer>
        <p>© 2026 DIAWLAL — Comprendre. Analyser. Évoluer.</p>
    </footer>

    <script>
        function lireOperations() {
            return JSON.parse(
                localStorage.getItem("diawlalOperations")
            ) || [];
        }

        function enregistrerOperations(operations) {
            localStorage.setItem(
                "diawlalOperations",
                JSON.stringify(operations)
            );
        }

        function ajouterOperation() {
            const type =
                document.getElementById("typeOperation").value;

            const description =
                document.getElementById("descriptionOperation").value.trim();

            const montant =
                Number(document.getElementById("montantOperation").value);

            if (!description || montant <= 0) {
                alert("Veuillez remplir correctement les champs.");
                return;
            }

            const operations = lireOperations();

            operations.unshift({
                type,
                description,
                montant,
                date: new Date().toLocaleDateString("fr-FR")
            });

            enregistrerOperations(operations);

            document.getElementById("descriptionOperation").value = "";
            document.getElementById("montantOperation").value = "";

            afficherPortefeuille();
        }

        function afficherPortefeuille() {
            const operations = lireOperations();

            let revenus = 0;
            let depenses = 0;

            operations.forEach(operation => {
                if (operation.type === "revenu") {
                    revenus += operation.montant;
                } else {
                    depenses += operation.montant;
                }
            });

            const capitalInitial =
                Number(localStorage.getItem("diawlalCapital")) || 0;

            const capitalDisponible =
                capitalInitial + revenus - depenses;

            document.getElementById("capitalDisponible").textContent =
                capitalDisponible.toLocaleString("fr-FR") + " FCFA";

            document.getElementById("totalRevenus").textContent =
                revenus.toLocaleString("fr-FR") + " FCFA";

            document.getElementById("totalDepenses").textContent =
                depenses.toLocaleString("fr-FR") + " FCFA";

            const liste =
                document.getElementById("listeOperations");

            if (operations.length === 0) {
                liste.innerHTML =
                    "<p>Aucune opération enregistrée.</p>";
                return;
            }

            liste.innerHTML = operations.map(operation => {
                const classe =
                    operation.type === "revenu"
                        ? "positif"
                        : "negatif";

                const signe =
                    operation.type === "revenu" ? "+" : "-";

                return `
                    <div class="operation">
                        <strong>${operation.description}</strong>
                        <p>${operation.date}</p>
                        <p class="${classe}">
                            ${signe}${operation.montant.toLocaleString("fr-FR")} FCFA
                        </p>
                    </div>
                `;
            }).join("");
        }

        afficherPortefeuille();
    </script>

</body>

</html>
