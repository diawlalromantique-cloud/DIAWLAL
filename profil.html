<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - DIAWLAL</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <div class="logo">DIAWLAL</div>

        <div>
            <a href="dashboard.html">Tableau de bord</a>
            <a href="academy.html">Academy</a>
            <a href="portefeuille.html">Portefeuille</a>
            <a href="alertes.html">Alertes</a>
            <a href="profil.html">Profil</a>
        </div>
    </nav>

    <section class="contact-section">

        <div class="contact-box">

            <h1>Mon profil</h1>

            <p>Modifiez vos informations personnelles.</p>

            <form onsubmit="enregistrerProfil(event)">

                <label for="nom">Nom complet</label>
                <input type="text" id="nom" required>

                <label for="email">Adresse e-mail</label>
                <input type="email" id="email" required>

                <label for="telephone">Téléphone</label>
                <input type="tel" id="telephone" placeholder="Votre numéro">

                <label for="objectif">Objectif financier</label>
                <textarea
                    id="objectif"
                    placeholder="Exemple : constituer une épargne, investir, créer une entreprise..."
                ></textarea>

                <button type="submit">Enregistrer le profil</button>

            </form>

        </div>

    </section>

    <footer>
        <p>© 2026 DIAWLAL — Comprendre. Analyser. Évoluer.</p>
    </footer>

    <script>
        function chargerProfil() {
            document.getElementById("nom").value =
                localStorage.getItem("diawlalNom") || "";

            document.getElementById("email").value =
                localStorage.getItem("diawlalEmail") || "";

            document.getElementById("telephone").value =
                localStorage.getItem("diawlalTelephone") || "";

            document.getElementById("objectif").value =
                localStorage.getItem("diawlalObjectif") || "";
        }

        function enregistrerProfil(event) {
            event.preventDefault();

            localStorage.setItem(
                "diawlalNom",
                document.getElementById("nom").value
            );

            localStorage.setItem(
                "diawlalEmail",
                document.getElementById("email").value
            );

            localStorage.setItem(
                "diawlalTelephone",
                document.getElementById("telephone").value
            );

            localStorage.setItem(
                "diawlalObjectif",
                document.getElementById("objectif").value
            );

            alert("Profil enregistré avec succès.");
        }

        chargerProfil();
    </script>

</body>

</html>
