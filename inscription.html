<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inscription - DIAWLAL</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <div class="logo">DIAWLAL</div>

        <div>
            <a href="index.html">Accueil</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
            <a href="connexion.html">Connexion</a>
        </div>
    </nav>

    <section class="contact-section">

        <div class="contact-box">

            <h1>Créer un compte</h1>

            <p>
                Rejoignez DIAWLAL et commencez votre parcours.
            </p>

            <form id="formInscription">

                <label for="nom">Nom complet</label>

                <input
                    type="text"
                    id="nom"
                    placeholder="Votre nom complet"
                    required
                >

                <label for="email">Adresse e-mail</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Votre e-mail"
                    required
                >

                <label for="motdepasse">Mot de passe</label>

                <input
                    type="password"
                    id="motdepasse"
                    placeholder="Minimum 6 caractères"
                    minlength="6"
                    required
                >

                <label for="confirmation">
                    Confirmer le mot de passe
                </label>

                <input
                    type="password"
                    id="confirmation"
                    placeholder="Confirmez le mot de passe"
                    minlength="6"
                    required
                >

            <button type="button" onclick="creerCompte()">
                    Créer mon compte
                </button>

            </form>

            <p style="margin-top: 20px;">
                Déjà inscrit ?
                <a href="connexion.html">Se connecter</a>
            </p>

        </div>

    </section>

    <footer>
        <p>
            © 2026 DIAWLAL — Comprendre. Analyser. Évoluer.
        </p>
    </footer>
<script>
    const formulaire = document.querySelector("form");

    formulaire.addEventListener("submit", async function(event) {
        event.preventDefault();

        const nom = document.getElementById("nom").value.trim();
        const email = document.getElementById("email").value.trim();
        const motDePasse = document.getElementById("motDePasse").value;

        const { error } = await window.diawlalSupabase.auth.signUp({
            email: email,
            password: motDePasse,
            options: {
                data: {
                    nom_complet: nom
                }
            }
        });

        if (error) {
            alert(error.message);
            return;
        }

        alert("Compte créé. Vérifie ton e-mail pour confirmer ton inscription.");
        window.location.href = "connexion.html";
    });

<script>
    async function creerCompte() {
        const nom = document.getElementById("nom").value.trim();
        const email = document.getElementById("email").value.trim();
        const motDePasse = document.getElementById("motDePasse").value;

        if (nom === "" || email === "" || motDePasse === "") {
            alert("Veuillez remplir tous les champs.");
            return;
        }

        const { error } = await window.diawlalSupabase.auth.signUp({
            email: email,
            password: motDePasse,
            options: {
                data: {
                    nom_complet: nom
                }
            }
        });

        if (error) {
            alert("Erreur : " + error.message);
            return;
        }

        alert("Compte créé. Vérifie ton e-mail pour confirmer l’inscription.");
        window.location.href = "connexion.html";
    }
</script>
