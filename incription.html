<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - DIAWLAL</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <div class="logo">DIAWLAL</div>

        <div>
            <a href="index.html">Accueil</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
            <a href="connexion.html">Connexion</a>
        </div>
    </nav>

    <section class="contact-section">

        <div class="contact-box">

            <h1>Créer un compte</h1>

            <p>
                Rejoignez DIAWLAL et commencez votre parcours.
            </p>

            <form onsubmit="creerCompte(event)">

                <label for="nom">Nom complet</label>
                <input
                    type="text"
                    id="nom"
                    placeholder="Votre nom complet"
                    required
                >

                <label for="email">Adresse e-mail</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Votre e-mail"
                    required
                >

                <label for="motdepasse">Mot de passe</label>
                <input
                    type="password"
                    id="motdepasse"
                    placeholder="Minimum 6 caractères"
                    minlength="6"
                    required
                >

                <label for="confirmation">Confirmer le mot de passe</label>
                <input
                    type="password"
                    id="confirmation"
                    placeholder="Confirmez le mot de passe"
                    minlength="6"
                    required
                >

                <button type="submit">Créer mon compte</button>

            </form>

            <p style="margin-top: 20px;">
                Déjà inscrit ?
                <a href="connexion.html">Se connecter</a>
            </p>

        </div>

    </section>

    <footer>
        <p>© 2026 DIAWLAL — Comprendre. Analyser. Évoluer.</p>
    </footer>

    <script>
        function creerCompte(event) {
            event.preventDefault();

            const nom = document.getElementById("nom").value;
            const motdepasse = document.getElementById("motdepasse").value;
            const confirmation = document.getElementById("confirmation").value;

            if (motdepasse !== confirmation) {
                alert("Les mots de passe ne correspondent pas.");
                return;
            }

            localStorage.setItem("diawlalNom", nom);

            alert("Compte créé avec succès !");
            window.location.href = "dashboard.html";
        }
    </script>

</body>

</html>
