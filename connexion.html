<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Connexion - DIAWLAL</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <div class="logo">DIAWLAL</div>

        <div>
            <a href="index.html">Accueil</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
            <a href="connexion.html">Connexion</a>
        </div>
    </nav>

    <section class="contact-section">

        <div class="contact-box">

            <h1>Connexion</h1>

            <p>
                Connectez-vous à votre espace DIAWLAL.
            </p>

            <form id="formConnexion">

                <label for="email">Adresse e-mail</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Votre e-mail"
                    required
                >

                <label for="motdepasse">Mot de passe</label>

                <input
                    type="password"
                    id="motdepasse"
                    placeholder="Votre mot de passe"
                    required
                >

                <button type="submit">
                    Se connecter
                </button>

            </form>

            <p style="margin-top: 20px;">
                Pas encore de compte ?
                <a href="inscription.html">
                    Créer un compte
                </a>
            </p>

        </div>

    </section>

    <footer>
        <p>
            © 2026 DIAWLAL — Comprendre. Analyser. Évoluer.
        </p>
    </footer>

    <script>
        const formConnexion =
            document.getElementById("formConnexion");

        formConnexion.addEventListener(
            "submit",
            function(event) {
                event.preventDefault();

                const email =
                    document.getElementById("email").value.trim();

                const motdepasse =
                    document.getElementById("motdepasse").value;

                const emailEnregistre =
                    localStorage.getItem("diawlalEmail");

                const motDePasseEnregistre =
                    localStorage.getItem(
                        "diawlalMotDePasse"
                    );

                if (
                    !emailEnregistre ||
                    !motDePasseEnregistre
                ) {
                    alert(
                        "Aucun compte enregistré. Créez d'abord un compte."
                    );

                    window.location.href =
                        "inscription.html";

                    return;
                }

                if (
                    email === emailEnregistre &&
                    motdepasse === motDePasseEnregistre
                ) {
                    localStorage.setItem(
                        "diawlalConnecte",
                        "oui"
                    );

                    alert("Connexion réussie !");

                    window.location.href =
                        "dashboard.html";
                } else {
                    alert(
                        "E-mail ou mot de passe incorrect."
                    );
                }
            }
        );
    </script>

</body>

</html>
