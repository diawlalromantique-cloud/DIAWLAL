<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Objectifs - DIAWLAL</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
            background: linear-gradient(135deg, #111827, #334155);
        }

        nav {
            width: min(1150px, 94%);
            margin: auto;
            padding: 25px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .logo {
            color: #60a5fa;
            font-size: 30px;
            font-weight: bold;
        }

        nav div:last-child {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            width: min(1050px, 92%);
            margin: auto;
            padding: 35px 0 60px;
        }

        .entete {
            text-align: center;
            margin-bottom: 30px;
        }

        .entete h1 {
            font-size: clamp(36px, 6vw, 50px);
            margin-bottom: 10px;
        }

        .entete p {
            color: #cbd5e1;
            font-size: 18px;
        }

        .bloc {
            margin-top: 25px;
            padding: 28px;
            color: #374151;
            background: white;
            border-radius: 20px;
        }

        .bloc h2 {
            margin-bottom: 20px;
            color: #1e3a5f;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            color: white;
            background: #3b82f6;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .liste {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .objectif {
            padding: 24px;
            color: #374151;
            background: white;
            border-radius: 20px;
        }

        .objectif h2 {
            margin-bottom: 12px;
            color: #1e3a5f;
        }

        .montants {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin: 15px 0;
        }

        .barre {
            width: 100%;
            height: 18px;
            overflow: hidden;
            margin: 15px 0;
            background: #e5e7eb;
            border-radius: 20px;
        }

        .progression {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #22c55e);
        }

        .pourcentage {
            margin-bottom: 15px;
            color: #3b82f6;
            font-size: 24px;
            font-weight: bold;
        }

        .boutons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .supprimer {
            background: #dc2626;
        }

        .supprimer:hover {
            background: #b91c1c;
        }

        .message-vide {
            margin-top: 25px;
            padding: 30px;
            text-align: center;
            color: #374151;
            background: white;
            border-radius: 20px;
        }

        @media (max-width: 700px) {
            nav {
                flex-direction: column;
            }

            nav div:last-child {
                justify-content: center;
            }

            .liste {
                grid-template-columns: 1fr;
            }

            .montants,
            .boutons {
                flex-direction: column;
            }
        }
    </style>

</head>

<body>

    <nav>

        <div class="logo">
            DIAWLAL
        </div>

        <div>
            <a href="dashboard.html">Tableau de bord</a>
            <a href="academy.html">Academy</a>
            <a href="portefeuille.html">Portefeuille</a>
            <a href="objectifs.html">Objectifs</a>
            <a href="alertes.html">Alertes</a>
            <a href="profil.html">Profil</a>
        </div>

    </nav>

    <main class="container">

        <section class="entete">

            <h1>Mes objectifs</h1>

            <p>
                Créez et suivez vos objectifs financiers.
            </p>

        </section>

        <section class="bloc">

            <h2>Créer un objectif</h2>

            <input
                type="text"
                id="nomObjectif"
                placeholder="Exemple : Acheter une voiture"
            >

            <input
                type="number"
                id="montantObjectif"
                placeholder="Montant cible en FCFA"
            >

            <input
                type="number"
                id="montantActuel"
                placeholder="Montant déjà économisé"
            >

            <button onclick="ajouterObjectif()">
                Créer l'objectif
            </button>

        </section>

        <section id="listeObjectifs" class="liste"></section>

        <div id="messageVide" class="message-vide">
            Aucun objectif enregistré.
        </div>

    </main>

    <script>

        let objectifs =
            JSON.parse(
                localStorage.getItem("diawlalObjectifs")
            ) || [];


        function formaterMontant(montant) {

            return Number(montant)
                .toLocaleString("fr-FR") + " FCFA";

        }


        function sauvegarderObjectifs() {

            localStorage.setItem(
                "diawlalObjectifs",
                JSON.stringify(objectifs)
            );

        }


        function ajouterObjectif() {

            const nom =
                document
                    .getElementById("nomObjectif")
                    .value
                    .trim();


            const montantCible =
                Number(
                    document
                        .getElementById("montantObjectif")
                        .value
                );


            const montantActuel =
                Number(
                    document
                        .getElementById("montantActuel")
                        .value
                );


            if (
                nom === "" ||
                montantCible <= 0 ||
                montantActuel < 0
            ) {

                alert(
                    "Veuillez remplir correctement tous les champs."
                );

                return;

            }


            const nouvelObjectif = {

                id: Date.now(),

                nom: nom,

                montantCible: montantCible,

                montantActuel: montantActuel

            };


            objectifs.push(nouvelObjectif);


            sauvegarderObjectifs();


            document
                .getElementById("nomObjectif")
                .value = "";


            document
                .getElementById("montantObjectif")
                .value = "";


            document
                .getElementById("montantActuel")
                .value = "";


            afficherObjectifs();

        }


        function supprimerObjectif(id) {

            const confirmation =
                confirm(
                    "Voulez-vous supprimer cet objectif ?"
                );


            if (!confirmation) {

                return;

            }


            objectifs =
                objectifs.filter(
                    function(objectif) {

                        return objectif.id !== id;

                    }
                );


            sauvegarderObjectifs();

            afficherObjectifs();

        }


        function ajouterEpargne(id) {

            const montant =
                Number(
                    prompt(
                        "Combien souhaitez-vous ajouter ?"
                    )
                );


            if (
                montant <= 0 ||
                isNaN(montant)
            ) {

                return;

            }


            const objectif =
                objectifs.find(
                    function(objectif) {

                        return objectif.id === id;

                    }
                );


            if (!objectif) {

                return;

            }


            objectif.montantActuel += montant;


            sauvegarderObjectifs();

            afficherObjectifs();

        }


        function afficherObjectifs() {

            const liste =
                document.getElementById(
                    "listeObjectifs"
                );


            const messageVide =
                document.getElementById(
                    "messageVide"
                );


            liste.innerHTML = "";


            if (objectifs.length === 0) {

                messageVide.style.display = "block";

                return;

            }


            messageVide.style.display = "none";


            objectifs.forEach(
                function(objectif) {


                    let pourcentage =
                        Math.round(
                            (
                                objectif.montantActuel /
                                objectif.montantCible
                            ) * 100
                        );


                    pourcentage =
                        Math.min(
                            pourcentage,
                            100
                        );


                    const carte =
                        document.createElement(
                            "article"
                        );


                    carte.className =
                        "objectif";


                    carte.innerHTML = `

                        <h2>
                            ${objectif.nom}
                        </h2>


                        <div class="montants">

                            <span>
                                Économisé :
                                <strong>
                                    ${formaterMontant(
                                        objectif.montantActuel
                                    )}
                                </strong>
                            </span>


                            <span>
                                Objectif :
                                <strong>
                                    ${formaterMontant(
                                        objectif.montantCible
                                    )}
                                </strong>
                            </span>

                        </div>


                        <div class="barre">

                            <div
                                class="progression"
                                style="
                                    width:
                                    ${pourcentage}%
                                "
                            >
                            </div>

                        </div>


                        <p class="pourcentage">
                            ${pourcentage} %
                        </p>


                        <div class="boutons">

                            <button
                                onclick="
                                    ajouterEpargne(
                                        ${objectif.id}
                                    )
                                "
                            >
                                Ajouter de l'épargne
                            </button>


                            <button
                                class="supprimer"
                                onclick="
                                    supprimerObjectif(
                                        ${objectif.id}
                                    )
                                "
                            >
                                Supprimer
                            </button>

                        </div>

                    `;


                    liste.appendChild(carte);

                }
            );

        }


        afficherObjectifs();

    </script>

</body>

</html>
