<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Objectifs - DIAWLAL</title>

    <style>
        :root {
            --or: #d4af37;
            --or-clair: #f4d76b;
            --or-fonce: #9d7515;
            --blanc: #f2f2f2;
            --gris: #b8b8b8;
            --bordure: rgba(212, 175, 55, 0.48);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--blanc);

            background:
                radial-gradient(
                    circle at top left,
                    rgba(212, 175, 55, 0.10),
                    transparent 28%
                ),
                linear-gradient(
                    135deg,
                    #080808,
                    #111111,
                    #181818
                );

            background-attachment: fixed;
        }

        nav {
            width: min(1200px, 95%);
            margin: auto;
            padding: 24px 10px;

            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;

            border-bottom:
                1px solid rgba(212, 175, 55, 0.18);
        }

        .logo {
            color: var(--or);
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .menu {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
        }

        nav a,
        .deconnexion {
            padding: 9px 10px;

            color: white;
            background: transparent;

            border: none;
            border-radius: 8px;

            text-decoration: none;
            font-size: 15px;
            font-weight: 700;

            cursor: pointer;
            transition: 0.25s;
        }

        nav a:hover,
        .deconnexion:hover {
            color: var(--or-clair);
            background: rgba(212, 175, 55, 0.10);
        }

        .container {
            width: min(1050px, 92%);
            margin: auto;
            padding: 50px 0 70px;
        }

        .entete {
            margin-bottom: 30px;
            text-align: center;
        }

        .entete h1 {
            margin-bottom: 10px;
            font-size: clamp(38px, 6vw, 58px);
        }

        .entete p {
            color: var(--gris);
            font-size: 18px;
        }

        .bloc {
            margin-bottom: 28px;
            padding: 28px;

            background:
                linear-gradient(
                    145deg,
                    #202020,
                    #111111
                );

            border: 1px solid var(--bordure);
            border-radius: 20px;
        }

        .bloc h2 {
            margin-bottom: 20px;
            color: var(--or-clair);
        }

        label {
            display: block;
            margin: 14px 0 7px;

            color: var(--or-clair);
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 14px;

            color: white;
            background: #0d0d0d;

            border: 1px solid rgba(212, 175, 55, 0.35);
            border-radius: 10px;

            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: var(--or);

            box-shadow:
                0 0 0 3px rgba(212, 175, 55, 0.12);
        }

        button {
            padding: 14px 18px;

            border: none;
            border-radius: 10px;

            font-size: 16px;
            font-weight: 900;

            cursor: pointer;
        }

        .bouton-principal {
            width: 100%;
            margin-top: 20px;

            color: #111111;

            background:
                linear-gradient(
                    135deg,
                    var(--or-clair),
                    var(--or),
                    var(--or-fonce)
                );
        }

        .bouton-principal:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        .liste-objectifs {
            display: grid;
            grid-template-columns:
                repeat(2, minmax(0, 1fr));

            gap: 20px;
        }

        .objectif {
            padding: 24px;

            background:
                linear-gradient(
                    145deg,
                    #202020,
                    #111111
                );

            border: 1px solid var(--bordure);
            border-radius: 18px;
        }

        .objectif h3 {
            margin-bottom: 18px;
            color: var(--or-clair);
            font-size: 25px;
        }

        .infos {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;

            margin-bottom: 15px;
        }

        .infos span {
            color: var(--gris);
        }

        .infos strong {
            color: white;
        }

        .barre {
            width: 100%;
            height: 14px;

            margin: 18px 0 12px;
            overflow: hidden;

            background: #0d0d0d;

            border: 1px solid rgba(212, 175, 55, 0.30);
            border-radius: 999px;
        }

        .barre-interieure {
            height: 100%;

            background:
                linear-gradient(
                    90deg,
                    var(--or-clair),
                    var(--or)
                );

            border-radius: 999px;
        }

        .pourcentage {
            margin-bottom: 18px;

            color: var(--or-clair);

            font-size: 24px;
            font-weight: 900;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .ajouter {
            color: #111111;

            background:
                linear-gradient(
                    135deg,
                    var(--or-clair),
                    var(--or)
                );
        }

        .supprimer {
            color: white;
            background: #be123c;
        }

        .message {
            display: none;

            margin-top: 16px;
            padding: 13px;

            border-radius: 10px;
            text-align: center;
        }

        .succes {
            display: block;

            color: #bbf7d0;
            background: rgba(34, 197, 94, 0.14);

            border: 1px solid rgba(34, 197, 94, 0.45);
        }

        .erreur {
            display: block;

            color: #fecaca;
            background: rgba(239, 68, 68, 0.14);

            border: 1px solid rgba(239, 68, 68, 0.45);
        }

        .vide {
            padding: 30px;

            color: var(--gris);
            text-align: center;

            border: 1px dashed rgba(212, 175, 55, 0.30);
            border-radius: 14px;
        }

        @media (max-width: 760px) {
            nav {
                flex-direction: column;
            }

            .liste-objectifs {
                grid-template-columns: 1fr;
            }

            .actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <nav>

        <div class="logo">
            DIAWLAL
        </div>

        <div class="menu">

            <a href="dashboard.html">Tableau de bord</a>
            <a href="academy.html">Academy</a>
            <a href="portefeuille.html">Portefeuille</a>
            <a href="objectifs.html">Objectifs</a>
            <a href="alertes.html">Alertes</a>
            <a href="profil.html">Profil</a>

            <button
                class="deconnexion"
                onclick="seDeconnecter()"
            >
                Déconnexion
            </button>

        </div>

    </nav>


    <main class="container">

        <section class="entete">

            <h1>
                Mes objectifs
            </h1>

            <p>
                Créez et suivez vos objectifs financiers.
            </p>

        </section>


        <section class="bloc">

            <h2>
                Créer un objectif
            </h2>

            <label for="nomObjectif">
                Nom de l'objectif
            </label>

            <input
                type="text"
                id="nomObjectif"
                placeholder="Exemple : Acheter une voiture"
            >


            <label for="montantCible">
                Montant cible en FCFA
            </label>

            <input
                type="number"
                id="montantCible"
                min="1"
                placeholder="Exemple : 2000000"
            >


            <label for="montantActuel">
                Montant déjà économisé
            </label>

            <input
                type="number"
                id="montantActuel"
                min="0"
                placeholder="Exemple : 50000"
            >


            <button
                class="bouton-principal"
                id="boutonCreation"
                onclick="creerObjectif()"
            >
                Créer l'objectif
            </button>

            <div
                id="messageCreation"
                class="message"
            ></div>

        </section>


        <section>

            <div
                id="listeObjectifs"
                class="liste-objectifs"
            >
                <p class="vide">
                    Chargement...
                </p>
            </div>

        </section>

    </main>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>


    <script>

        let utilisateurConnecte = null;


        function formaterMontant(montant) {

            return (
                Number(montant || 0)
                    .toLocaleString("fr-FR")
                + " FCFA"
            );

        }


        function afficherMessage(id, texte, type) {

            const element =
                document.getElementById(id);

            element.textContent = texte;
            element.className =
                "message " + type;

        }


        async function verifierSession() {

            const {
                data,
                error
            } =
                await window
                    .diawlalSupabase
                    .auth
                    .getSession();


            if (
                error ||
                !data.session
            ) {

                window.location.href =
                    "connexion.html";

                return false;

            }


            utilisateurConnecte =
                data.session.user;

            return true;

        }


        async function chargerObjectifs() {

            const {
                data,
                error
            } =
                await window
                    .diawlalSupabase
                    .from("objectifs")
                    .select(
                        "id, nom, montant_cible, montant_actuel, created_at"
                    )
                    .eq(
                        "user_id",
                        utilisateurConnecte.id
                    )
                    .order(
                        "created_at",
                        {
                            ascending: false
                        }
                    );


            if (error) {

                console.error(error);

                return [];

            }


            return data || [];

        }


        function afficherObjectifs(objectifs) {

            const conteneur =
                document.getElementById(
                    "listeObjectifs"
                );


            if (
                !objectifs ||
                objectifs.length === 0
            ) {

                conteneur.innerHTML =
                    `
                    <p class="vide">
                        Aucun objectif enregistré.
                    </p>
                    `;

                return;

            }


            conteneur.innerHTML = "";


            objectifs.forEach(
                function(objectif) {

                    const cible =
                        Number(
                            objectif.montant_cible
                        ) || 0;


                    const actuel =
                        Number(
                            objectif.montant_actuel
                        ) || 0;


                    let pourcentage = 0;


                    if (cible > 0) {

                        pourcentage =
                            Math.round(
                                (
                                    actuel
                                    / cible
                                )
                                * 100
                            );

                    }


                    pourcentage =
                        Math.min(
                            100,
                            Math.max(
                                0,
                                pourcentage
                            )
                        );


                    const element =
                        document.createElement(
                            "article"
                        );


                    element.className =
                        "objectif";


                    element.innerHTML =
                        `
                        <h3>
                            ${objectif.nom}
                        </h3>

                        <div class="infos">

                            <span>
                                Économisé :
                                <strong>
                                    ${formaterMontant(actuel)}
                                </strong>
                            </span>

                            <span>
                                Objectif :
                                <strong>
                                    ${formaterMontant(cible)}
                                </strong>
                            </span>

                        </div>

                        <div class="barre">

                            <div
                                class="barre-interieure"
                                style="width: ${pourcentage}%"
                            ></div>

                        </div>

                        <div class="pourcentage">
                            ${pourcentage} %
                        </div>

                        <div class="actions">

                            <button
                                class="ajouter"
                                onclick="ajouterEpargne('${objectif.id}', ${actuel})"
                            >
                                Ajouter de l'épargne
                            </button>

                            <button
                                class="supprimer"
                                onclick="supprimerObjectif('${objectif.id}')"
                            >
                                Supprimer
                            </button>

                        </div>
                        `;


                    conteneur.appendChild(
                        element
                    );

                }
            );

        }


        async function actualiserObjectifs() {

            const objectifs =
                await chargerObjectifs();


            afficherObjectifs(
                objectifs
            );

        }


        async function creerObjectif() {

            const nom =
                document
                    .getElementById(
                        "nomObjectif"
                    )
                    .value
                    .trim();


            const montantCible =
                Number(
                    document
                        .getElementById(
                            "montantCible"
                        )
                        .value
                );


            const montantActuel =
                Number(
                    document
                        .getElementById(
                            "montantActuel"
                        )
                        .value
                    || 0
                );


            if (
                nom === ""
                ||
                Number.isNaN(montantCible)
                ||
                montantCible <= 0
                ||
                Number.isNaN(montantActuel)
                ||
                montantActuel < 0
            ) {

                afficherMessage(
                    "messageCreation",
                    "Remplis correctement tous les champs.",
                    "erreur"
                );

                return;

            }


            const bouton =
                document.getElementById(
                    "boutonCreation"
                );


            bouton.disabled = true;
            bouton.textContent =
                "Création...";


            const {
                error
            } =
                await window
                    .diawlalSupabase
                    .from("objectifs")
                    .insert(
                        {
                            user_id:
                                utilisateurConnecte.id,

                            nom:
                                nom,

                            montant_cible:
                                montantCible,

                            montant_actuel:
                                montantActuel
                        }
                    );


            bouton.disabled = false;
            bouton.textContent =
                "Créer l'objectif";


            if (error) {

                afficherMessage(
                    "messageCreation",
                    "Erreur : "
                    + error.message,
                    "erreur"
                );

                return;

            }


            document
                .getElementById(
                    "nomObjectif"
                )
                .value = "";


            document
                .getElementById(
                    "montantCible"
                )
                .value = "";


            document
                .getElementById(
                    "montantActuel"
                )
                .value = "";


            afficherMessage(
                "messageCreation",
                "Objectif créé.",
                "succes"
            );


            await actualiserObjectifs();

        }


        async function ajouterEpargne(
            idObjectif,
            montantActuel
        ) {

            const valeur =
                prompt(
                    "Combien souhaitez-vous ajouter ?"
                );


            if (valeur === null) {

                return;

            }


            const ajout =
                Number(valeur);


            if (
                Number.isNaN(ajout)
                ||
                ajout <= 0
            ) {

                alert(
                    "Entre un montant valide."
                );

                return;

            }


            const nouveauMontant =
                Number(montantActuel)
                + ajout;


            const {
                error
            } =
                await window
                    .diawlalSupabase
                    .from("objectifs")
                    .update(
                        {
                            montant_actuel:
                                nouveauMontant
                        }
                    )
                    .eq(
                        "id",
                        idObjectif
                    );


            if (error) {

                alert(
                    "Erreur : "
                    + error.message
                );

                return;

            }


            await actualiserObjectifs();

        }


        async function supprimerObjectif(
            idObjectif
        ) {

            const confirmation =
                confirm(
                    "Supprimer cet objectif ?"
                );


            if (!confirmation) {

                return;

            }


            const {
                error
            } =
                await window
                    .diawlalSupabase
                    .from("objectifs")
                    .delete()
                    .eq(
                        "id",
                        idObjectif
                    );


            if (error) {

                alert(
                    "Erreur : "
                    + error.message
                );

                return;

            }


            await actualiserObjectifs();

        }


        async function seDeconnecter() {

            await window
                .diawlalSupabase
                .auth
                .signOut();


            window.location.href =
                "connexion.html";

        }


        async function demarrer() {

            const sessionValide =
                await verifierSession();


            if (!sessionValide) {

                return;

            }


            await actualiserObjectifs();

        }


        demarrer();

    </script>

</body>

</html>
